# Vic3 Economic Analyser configuration.
# Paths may be left blank to use auto-detection (see config.py defaults).

[paths]
# Root of the Victoria 3 game install (the folder containing `game/common/...`).
# Leave blank to try common Steam locations.
vic3_install = "/home/kolesniii/Games/Victoria3"

# Folder containing your save games (.v3). Leave blank to auto-detect.
# Auto-detection covers native Windows/macOS/Linux locations and the
# Proton prefix on Linux (steamapps/compatdata/529340/.../save games).
save_dir = "/home/kolesniii/.steam/steam/steamapps/compatdata/2912822744/pfx/drive_c/users/steamuser/Documents/Paradox Interactive/Victoria 3/save games"

# Optional: extra mod common/ roots to overlay on top of base game defs,
# in load order (later overrides earlier). Usually leave empty.
mod_dirs = []

# Path to the rakaly melter binary, used to convert binary/ironman saves to
# plaintext. Leave blank to look it up on PATH (a `melter` binary built from
# rakaly/librakaly is preferred, else the `rakaly` CLI). If you save in
# plaintext (save_file_format = "text" in pdx_settings.json) this is not needed.
rakaly_bin = ""

# Where the analyser stores its SQLite time-series DB and parsed-def cache.
data_dir = ".vic3analyser"

[game]
# Your country's tag (e.g. "GBR", "USA"). Leave blank to use the
# player-controlled country recorded in the save.
player_tag = ""

[server]
host = "127.0.0.1"
port = 8000

# When true (default), continuously watch the save folder and analyse every
# new save (autosaves and manual saves alike). Set to false to analyse only
# on demand from the Settings page — e.g. once at the start of a game to plan
# your opening, or right after a major event. The watch mode can also be
# toggled at runtime from the dashboard's Settings tab.
auto_watch = true

# Which saves the watcher reacts to while auto_watch is on:
#   "any"      — every new save (autosaves and manual saves alike)
#   "autosave" — only Vic3's autosave*.v3 files
# Also switchable at runtime from the Settings tab.
watch_mode = "any"
