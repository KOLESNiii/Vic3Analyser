# Vic3 Economic Analyser configuration.
# Paths may be left blank to use auto-detection (see config.py defaults).

[paths]
# Root of the Victoria 3 game install (the folder containing `game/common/...`).
# Leave blank to try common Steam locations.
vic3_install = "/home/kolesniii/Games/Victoria3"

# Folder containing your save games (.v3). Leave blank to auto-detect.
# Auto-detection covers native Windows/macOS/Linux locations and the
# Proton prefix on Linux (steamapps/compatdata/529340/.../save games).
save_dir = "/home/kolesniii/.steam/steam/steamapps/compatdata/2912822744/pfx/drive_c/users/steamuser/Documents/Paradox Interactive/Victoria 3/save games"

# Optional: extra mod common/ roots to overlay on top of base game defs,
# in load order (later overrides earlier). Usually leave empty.
mod_dirs = []

# Path to the rakaly melter binary, used to convert binary/ironman saves to
# plaintext. Leave blank to look it up on PATH (a `melter` binary built from
# rakaly/librakaly is preferred, else the `rakaly` CLI). If you save in
# plaintext (save_file_format = "text" in pdx_settings.json) this is not needed.
rakaly_bin = ""

# Where the analyser stores its SQLite time-series DB and parsed-def cache.
data_dir = ".vic3analyser"

[game]
# Your country's tag (e.g. "GBR", "USA"). Leave blank to use the
# player-controlled country recorded in the save.
player_tag = ""

[server]
host = "127.0.0.1"
port = 8000

# When true (default), continuously watch the save folder and analyse every
# new save (autosaves and manual saves alike). Set to false to analyse only
# on demand from the Settings page — e.g. once at the start of a game to plan
# your opening, or right after a major event. The watch mode can also be
# toggled at runtime from the dashboard's Settings tab.
auto_watch = true

# Which saves the watcher reacts to while auto_watch is on:
#   "any"      — every new save (autosaves and manual saves alike)
#   "autosave" — only Vic3's autosave*.v3 files
# Also switchable at runtime from the Settings tab.
watch_mode = "any"

[optimize]
# Strategy optimizer / forecaster (the "Strategy & Forecast" tab). All of these
# can also be overridden per-request from the dashboard.

# Planning horizon, in game-months, for the forecast trajectory.
horizon_months = 60

# What to maximize:
#   "growth"    — sustained compounding GDP growth rate, constrained by solvency (default)
#   "composite" — GDP + standard of living + staying solvent
#   "gdp"       — projected GDP at the horizon
#   "cash"      — treasury / construction ROI
objective = "growth"

# Construction points/week available to the plan. Leave blank to read it from
# the save (often missing) and otherwise estimate it from your economy.
construction_capacity = ""

# Assumed share of each good's market your own production represents. Used to
# size how much your building decisions move prices when there isn't enough
# save history to calibrate it directly. 0..1.
world_market_share = 0.25

# Local-search effort: number of plan-perturbation rounds after the greedy
# pass. Higher = explores more combinations (slower). 0 = greedy only.
search_effort = 200

# Composite-objective weights (only used when objective = "composite").
weight_gdp = 1.0
weight_sol = 0.4
weight_solvency = 1.0

# Solvency policy for the optimizer. With "hard_buffer", plans are only
# considered feasible if treasury + credit stays above the reserve for the full
# forecast horizon. The default reserve is 12 weeks of current weekly expenses.
solvency_policy = "hard_buffer"
solvency_buffer_weeks = 12

# --- model fidelity -------------------------------------------------------
# Each flag turns on one extra real economic mechanic in the GDP/finance model.
# All are player-derivable; estimate-heavy ones become no-ops if the save lacks
# the data. Turn any off to simplify (and speed up) the model.
model_throughput = true          # tech/law/PM throughput multipliers
model_economy_of_scale = true    # per-level building concentration bonus
model_construction_pm = true     # upgrade construction-sector frames (2→5→10→15 pts/lvl)
model_endogenous_demand = true   # your own growth raises domestic demand & prices
model_labour = true              # workforce-supply limit + pop/migration growth
model_bureaucracy = true         # bureaucracy & tax-capacity constraint on growth
model_investment_pool = true     # private, pool-funded construction stream
model_laws = true                # economic-system law modifiers

# Strength of the "growth creates customers" feedback (consumer price rise per
# unit of fractional GDP growth).
demand_elasticity = 0.5
# Baseline annual workforce growth (scaled up by standard of living).
labour_growth_annual = 0.015
# Scenario: pretend this economic-system law is active (e.g. "law_laissez_faire")
# to see how it changes the plan. Blank = use the law in your save.
assumed_economic_law = ""
# Fallback private-construction share if the save's investment-pool inflow can't
# be read. Blank = derive it from the save.
private_construction_share = ""

# Search: "anneal" (simulated annealing over a larger neighbourhood) or "greedy"
# (legacy water-filling + random hill-climb).
search_algo = "anneal"
# Let the search schedule a tech whose unlock improves the trajectory.
tech_lookahead = true
# Emit a growth/solvency/SoL Pareto set alongside the chosen plan.
multi_objective = false
